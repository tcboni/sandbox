<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandbox</title>

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%20fill%3D%22none%22%3E%3Cpath%20d%3D%22M10%206L3%2016L10%2026L22%206L29%2016L22%2026%22%20stroke%3D%22url(%23pg-g)%22%20stroke-width%3D%222.8%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22pg-g%22%20x1%3D%223%22%20y1%3D%2216%22%20x2%3D%2229%22%20y2%3D%2216%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%3Cstop%20stop-color%3D%22%23d8d8e0%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23888898%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3C%2Fsvg%3E"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-0: #0a0a14;
        --bg-1: #14141e;
        --bg-2: #1c1c2a;
        --bg-3: #262635;
        --border: #3a3a4a;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #388bfd;
        --accent-hi: #58a6ff;
        --green: #3fb950;
        --orange: #e8912d;
        --blue: #4db6f8;
        --purple: #c98fff;
        --yellow: #e6b450;
        --red: #f85149;

        --metal-1: #d8d8e0;
        --metal-2: #b0b0c0;
        --metal-3: #888898;
        --metal-4: #545464;
        --metal-5: #2a2a38;
        --metal-6: #0a0a10;

        --tab-h: 34px;
      }

      @property --gradient_rotate {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }

      @keyframes button_gradient_rotate {
        from {
          --gradient_rotate: 0deg;
        }
        to {
          --gradient_rotate: 360deg;
        }
      }

      @keyframes logo-shimmer {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(180deg, var(--bg-0) 50%, #14142a);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 13px;
      }

      /* ─── Header ─────────────────────────────────────────────── */
      #header {
        background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
        border-bottom: 1px solid var(--border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        padding: 9px 14px;
        gap: 10px;
        flex-shrink: 0;
        position: relative;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        flex-shrink: 0;
        position: relative;
        z-index: 5;
        filter: drop-shadow(0 0 17px rgb(220 220 220 / 0.2));
      }
      .logo-bezel {
        --gradient_rotate: 0deg;
        position: relative;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background:
          linear-gradient(0deg, rgb(010 010 010 / 1) 10%, rgb(040 040 050 / 1))
            padding-box,
          conic-gradient(
              from var(--gradient_rotate),
              rgb(from var(--metal-1) r g b / 0.5),
              rgb(from var(--metal-1) r g b / 0),
              rgb(from var(--metal-6) r g b / 0),
              rgb(from var(--metal-6) r g b / 1),
              rgb(from var(--metal-4) r g b / 0.5),
              rgb(from var(--metal-4) r g b / 0),
              rgb(from var(--metal-4) r g b / 1),
              rgb(from var(--metal-1) r g b / 0.5)
            )
            border-box;
        animation: button_gradient_rotate 15s linear infinite;
        border: 2px solid transparent;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.5),
          0 0 3px 2px rgba(0, 0, 0, 0.6);
      }
      .logo-bezel::before {
        content: "";
        position: absolute;
        inset: -2px;
        z-index: -1;
        border-radius: inherit;
        background:
          conic-gradient(
              from var(--gradient_rotate),
              rgb(from var(--metal-3) r g b / 1),
              rgb(from var(--metal-1) r g b / 1),
              rgb(from var(--metal-1) r g b / 1),
              rgb(from var(--metal-6) r g b / 1),
              rgb(from var(--metal-2) r g b / 1),
              rgb(from var(--metal-5) r g b / 1),
              rgb(from var(--metal-4) r g b / 1),
              rgb(from var(--metal-3) r g b / 1)
            )
            padding-box,
          conic-gradient(
              from 0deg,
              rgb(from var(--metal-3) r g b / 1),
              rgb(from var(--metal-1) r g b / 1),
              rgb(from var(--metal-1) r g b / 1),
              rgb(from var(--metal-6) r g b / 1),
              rgb(from var(--metal-2) r g b / 1),
              rgb(from var(--metal-5) r g b / 1),
              rgb(from var(--metal-4) r g b / 1),
              rgb(from var(--metal-3) r g b / 1)
            )
            border-box;
        animation: button_gradient_rotate 10s linear infinite reverse;
        border: 1px solid transparent;
      }
      .logo-bezel svg {
        display: block;
        width: 18px;
        height: 18px;
      }
      .logo-text {
        font-size: 15px;
        font-weight: 700;
        background: linear-gradient(
          90deg,
          #888898,
          #d8d8e0,
          #ffffff,
          #d8d8e0,
          #888898,
          #545464,
          #888898
        );
        background-size: 200% 100%;
        background-position: 0% 50%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.3px;
        white-space: nowrap;
        filter: drop-shadow(0 1px 2px rgb(0 0 0 / 0.8));
        animation: logo-shimmer 10s ease-in-out infinite;
      }

      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          background 0.12s,
          border-color 0.12s,
          color 0.12s;
        outline: none;
        white-space: nowrap;
        user-select: none;
      }
      .btn svg {
        flex-shrink: 0;
      }
      .btn-secondary {
        background: transparent;
        color: var(--muted);
      }
      .btn-secondary:hover {
        background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        color: var(--text);
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border-color: transparent;
        padding: 5px 9px;
      }
      .btn-ghost:hover {
        color: var(--text);
        background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .btn-ghost.active {
        color: var(--purple);
        background: linear-gradient(
          180deg,
          rgba(201, 143, 255, 0.14),
          rgba(201, 143, 255, 0.06)
        );
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      #btn-share {
        color: var(--text);
        background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
        border: 1px solid var(--border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      #btn-share:hover {
        background: linear-gradient(180deg, #2e2e40, var(--bg-3));
        border-color: var(--metal-4);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      /* ─── Main layout ─────────────────────────────────────────── */
      #main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      /* ─── Editors pane ────────────────────────────────────────── */
      #editors-pane {
        width: 50%;
        min-width: 160px;
        max-width: calc(100% - 160px);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .editor-panel {
        display: flex;
        flex-direction: column;
        flex: 0 0 auto;
        min-height: 50px;
        overflow: hidden;
      }

      .editor-tab {
        height: var(--tab-h);
        background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
        border-bottom: 1px solid var(--border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
        padding: 0 13px;
        gap: 7px;
        flex-shrink: 0;
        user-select: none;
      }

      .tab-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        position: relative;
        box-shadow:
          inset 0 -1px 1px rgba(0, 0, 0, 0.35),
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          0 0 0 1px rgba(0, 0, 0, 0.3);
      }
      .tab-dot::after {
        content: "";
        position: absolute;
        top: 1px;
        left: 1.5px;
        width: 3px;
        height: 2px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.55);
        filter: blur(0.3px);
      }
      .tab-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.9px;
      }

      #html-panel .tab-dot {
        background: var(--orange);
      }
      #html-panel .tab-label {
        color: var(--orange);
      }
      #css-panel .tab-dot {
        background: var(--blue);
      }
      #css-panel .tab-label {
        color: var(--blue);
      }
      #js-panel .tab-dot {
        background: var(--purple);
      }
      #js-panel .tab-label {
        color: var(--purple);
      }

      /* ─── Editor container ────────────────────────────────── */
      .editor-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-height: 0;
      }
      .editor-wrap .code-editor {
        position: absolute;
        inset: 0;
        margin: 0;
        min-height: 100%;
        border: none;
        outline: none;
        background: var(--bg-0);
        color: var(--text);
        font-family:
          "SF Mono", "Cascadia Code", "Fira Code", Consolas, "Liberation Mono",
          monospace;
        font-size: 12.5px;
        line-height: 1.65;
        padding: 8px;
        white-space: pre-wrap;
        overflow-wrap: break-word;
        tab-size: 2;
        font-variant-ligatures: none;
        overflow: auto;
      }

      .editor-wrap .code-editor,
      .editor-wrap .code-editor * {
        font-style: normal !important;
        font-weight: 400 !important;
      }

      /* ─── Resize handles ──────────────────────────────────────── */
      .rh {
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.15s;
        background-clip: content-box;
        position: relative;
        z-index: 5;
      }
      .rh:hover,
      .rh.dragging {
        background-color: var(--metal-3);
      }
      .rh-v:hover,
      .rh-v.dragging {
        background-image: linear-gradient(
          90deg,
          var(--metal-4),
          var(--metal-1),
          var(--metal-4)
        );
      }
      .rh-h:hover,
      .rh-h.dragging {
        background-image: linear-gradient(
          180deg,
          var(--metal-4),
          var(--metal-1),
          var(--metal-4)
        );
      }

      .rh-h {
        height: 8px;
        padding: 2px 0;
        margin: -2px 0;
        cursor: ns-resize;
      }

      .rh-v {
        width: 8px;
        padding: 0 2px;
        margin: 0 -2px;
        cursor: ew-resize;
      }

      /* ─── Preview pane ────────────────────────────────────────── */
      #preview-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 160px;
      }

      .preview-tab {
        height: var(--tab-h);
        background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
        border-bottom: 1px solid var(--border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
        padding: 0 13px;
        gap: 7px;
        flex-shrink: 0;
        user-select: none;
      }
      .preview-tab .tab-dot {
        background: var(--green);
      }
      .preview-tab .tab-label {
        color: var(--green);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.9px;
      }
      .preview-tab-right {
        margin-left: auto;
        display: flex;
        gap: 2px;
        align-items: center;
      }

      /* iframe wrapper — needed for the drag shield overlay */
      #frame-wrap {
        flex: 1;
        position: relative;
        min-height: 0;
        overflow: hidden;
      }
      #preview-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      #drag-shield {
        display: none;
        position: absolute;
        inset: 0;
        z-index: 50;
        cursor: inherit;
      }
      #drag-shield.active {
        display: block;
      }

      /* ─── Console ─────────────────────────────────────────────── */
      #console-resize {
        display: none;
      }

      #console-pane {
        flex-shrink: 0;
        height: 190px;
        display: none;
        flex-direction: column;
        border-top: 1px solid var(--border);
        overflow: hidden;
      }
      #console-pane.visible,
      #console-resize.visible {
        display: flex;
      }

      .console-tab {
        height: var(--tab-h);
        background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
        border-bottom: 1px solid var(--border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        padding: 0 13px;
        gap: 7px;
        flex-shrink: 0;
        user-select: none;
      }
      .console-tab .tab-dot {
        background: var(--yellow);
      }
      .console-tab .tab-label {
        color: var(--yellow);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.9px;
      }
      .console-tab-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .console-count {
        font-size: 10px;
        background: var(--bg-3);
        color: var(--muted);
        border-radius: 10px;
        padding: 1px 7px;
        min-width: 20px;
        text-align: center;
        display: none;
      }
      .console-count.visible {
        display: inline-block;
      }

      #console-output {
        flex: 1;
        overflow-y: auto;
        font-family:
          "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        font-size: 11.5px;
        padding: 4px 0;
      }

      .c-entry {
        display: flex;
        align-items: flex-start;
        padding: 2px 0;
        line-height: 1.5;
        border-bottom: 1px solid transparent;
      }
      .c-entry:hover {
        background: rgba(255, 255, 255, 0.025);
      }
      .c-entry.log {
        color: var(--text);
      }
      .c-entry.warn {
        color: var(--yellow);
        background: rgba(230, 180, 80, 0.04);
        border-color: rgba(230, 180, 80, 0.08);
      }
      .c-entry.error {
        color: var(--red);
        background: rgba(248, 81, 73, 0.04);
        border-color: rgba(248, 81, 73, 0.08);
      }
      .c-entry.info {
        color: var(--blue);
      }

      .c-gutter {
        width: 32px;
        flex-shrink: 0;
        text-align: center;
        padding-top: 1px;
        font-size: 10px;
        opacity: 0.5;
      }
      .c-entry.log .c-gutter::before {
        content: "›";
      }
      .c-entry.warn .c-gutter::before {
        content: "⚠";
      }
      .c-entry.error .c-gutter::before {
        content: "✕";
      }
      .c-entry.info .c-gutter::before {
        content: "i";
        font-style: italic;
      }

      .c-msg {
        flex: 1;
        padding-right: 12px;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* ─── Toast ───────────────────────────────────────────────── */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background:
          linear-gradient(180deg, var(--bg-3), var(--bg-2)) padding-box,
          conic-gradient(
              from 45deg,
              var(--metal-3),
              var(--metal-1),
              var(--metal-4),
              var(--metal-2),
              var(--metal-3),
              var(--metal-1),
              var(--metal-3)
            )
            border-box;
        border: 1px solid transparent;
        color: var(--text);
        padding: 9px 16px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 999;
        pointer-events: none;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      #toast.show {
        transform: translateX(-50%) translateY(0);
      }
      #toast.ok .toast-icon::before {
        content: "✓";
        color: var(--green);
      }
      #toast.copy .toast-icon::before {
        content: "";
        display: inline-block;
        width: 13px;
        height: 13px;
        background-color: var(--accent-hi);
        -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='black' d='M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z'/></svg>");
        mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='black' d='M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z'/></svg>");
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
      }

      /* ─── Scrollbars ──────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--metal-3), var(--metal-4));
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, var(--metal-2), var(--metal-3));
      }

      /* ─── No-select during drag ───────────────────────────────── */
      body.dragging {
        user-select: none;
        cursor: col-resize;
      }
      body.dragging-h {
        user-select: none;
        cursor: row-resize;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div id="header">
      <div class="logo">
        <span class="logo-bezel">
          <svg
            width="18"
            height="18"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M10 6L3 16L10 26L22 6L29 16L22 26"
              stroke="url(#pg-g)"
              stroke-width="2.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <defs>
              <linearGradient
                id="pg-g"
                x1="3"
                y1="16"
                x2="29"
                y2="16"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#d8d8e0" />
                <stop offset="1" stop-color="#888898" />
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="logo-text">Sandbox</span>
      </div>
      <div class="header-right">
        <button class="btn btn-secondary" id="btn-share">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path

            <path
              fill="currentColor"
              d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"

    <!-- Main -->
    <div id="main">

      <!-- Vertical splitter -->
      <div class="rh rh-v" id="rv"></div>

      <!-- Preview + Console -->
      <div id="preview-pane">

          <div class="preview-tab-right">

              class="btn btn-ghost"

                width="13"

                fill="currentColor"
              >
                <path
                  d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V2.75zm1.75-.25a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75zm5 8a.75.75 0 010 1.5h-2.5a.75.75 0 010-1.5h2.5zm3.854-3.396a.75.75 0 010 1.06l-1.75 1.75a.75.75 0 01-1.06-1.06l1.22-1.22-1.22-1.22a.75.75 0 011.06-1.06l1.75 1.75z"
                />

            <button
              class="btn btn-ghost"
              id="btn-refresh"
              title="Refresh preview"
            >
              <svg
                width="12"
                height="12"
                viewBox="0 0 16 16"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M8 3a5 5 0 104.546 2.914.5.5 0 00-.908-.417A4 4 0 118 4V3z"
                />
                <path
                  d="M8 4.466V.534a.25.25 0 01.41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 018 4.466z"
                />
              </svg>

        <div id="frame-wrap">
          <iframe
            id="preview-frame"
            sandbox="allow-scripts allow-modals allow-forms"
          ></iframe>
          <div id="drag-shield"></div>
        </div>

        <div class="rh rh-h" id="console-resize"></div>

        <div id="console-pane">
          <div class="console-tab">
            <span class="tab-dot"></span>
            <span class="tab-label">Console</span>
            <div class="console-tab-right">
              <span class="console-count" id="console-count">0</span>

    <div id="toast">
      <span class="toast-icon"></span><span id="toast-msg"></span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script>
      "use strict";

      /* ── Elements ──────────────────────────────────────────────────── */
      const frame = document.getElementById("preview-frame");
      const consolePn = document.getElementById("console-pane");
      const consoleRes = document.getElementById("console-resize");
      const consoleOut = document.getElementById("console-output");
      const consoleCount = document.getElementById("console-count");
      const editorsPane = document.getElementById("editors-pane");
      const mainArea = document.getElementById("main");
      const htmlPanel = document.getElementById("html-panel");
      const cssPanel = document.getElementById("css-panel");
      const jsPanel = document.getElementById("js-panel");
      const dragShield = document.getElementById("drag-shield");
      const toastEl = document.getElementById("toast");
      const toastMsg = document.getElementById("toast-msg");
      const btnConsole = document.getElementById("btn-console");

      /* ── Editors ────────────────────────────────────────── */
      const htmlEd = document.getElementById("html-ed");
      const cssEd = document.getElementById("css-ed");
      const jsEd = document.getElementById("js-ed");

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function getEditorValue(editor) {
        return editor.textContent || "";
      }

      function setEditorValue(editor, value) {
        editor.textContent = value || "";
      }

      function getCaretOffset(editor) {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return 0;
        const range = sel.getRangeAt(0);
        if (!editor.contains(range.startContainer)) return 0;
        const pre = range.cloneRange();
        pre.selectNodeContents(editor);
        pre.setEnd(range.startContainer, range.startOffset);
        return pre.toString().length;
      }

      function setCaretOffset(editor, offset) {
        const sel = window.getSelection();
        if (!sel) return;
        const range = document.createRange();
        let current = 0;
        const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
        let node = walker.nextNode();
        while (node) {
          const next = current + node.nodeValue.length;
          if (offset <= next) {
            range.setStart(node, Math.max(0, offset - current));
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
            return;
          }
          current = next;
          node = walker.nextNode();
        }
        range.selectNodeContents(editor);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }

      function renderHighlightedEditor(editor, language) {
        const source = getEditorValue(editor);
        const caret = getCaretOffset(editor);
        if (window.hljs) {
          editor.innerHTML = hljs.highlight(source, { language }).value;
        } else {
          editor.innerHTML = escapeHtml(source);
        }
        setCaretOffset(editor, caret);
      }

      function insertAtCaret(text) {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return;
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const textNode = document.createTextNode(text);
        range.insertNode(textNode);
        range.setStartAfter(textNode);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      }

      const editorHistories = new WeakMap();
      const HISTORY_COALESCE_MS = 400;
      const HISTORY_LIMIT = 200;

      function initEditorHistory(editor) {
        editorHistories.set(editor, {
          undo: [],
          redo: [],
          lastPush: 0,
          suspended: false,
        });
      }

      function snapshotEditor(editor) {
        return { text: getEditorValue(editor), caret: getCaretOffset(editor) };
      }

      function recordHistory(editor) {
        const h = editorHistories.get(editor);
        if (!h || h.suspended) return;
        const now = Date.now();
        if (now - h.lastPush > HISTORY_COALESCE_MS || h.undo.length === 0) {
          h.undo.push(snapshotEditor(editor));
          if (h.undo.length > HISTORY_LIMIT) h.undo.shift();
        }
        h.lastPush = now;
        h.redo = [];
      }

      function applySnapshot(editor, snap, language) {
        setEditorValue(editor, snap.text);
        renderHighlightedEditor(editor, language);
        setCaretOffset(editor, snap.caret);
      }

      function undoEditor(editor, language) {
        const h = editorHistories.get(editor);
        if (!h || h.undo.length === 0) return;
        const current = snapshotEditor(editor);
        const prev = h.undo.pop();
        h.redo.push(current);
        h.lastPush = 0;
        h.suspended = true;
        applySnapshot(editor, prev, language);
        h.suspended = false;
        scheduleRun();
        saveCode();
      }

      function redoEditor(editor, language) {
        const h = editorHistories.get(editor);
        if (!h || h.redo.length === 0) return;
        const current = snapshotEditor(editor);
        const next = h.redo.pop();
        h.undo.push(current);
        h.lastPush = 0;
        h.suspended = true;
        applySnapshot(editor, next, language);
        h.suspended = false;
        scheduleRun();
        saveCode();
      }

      function bindEditorBehavior(editor, language) {
        initEditorHistory(editor);

        editor.addEventListener("beforeinput", () => {
          recordHistory(editor);
        });

        editor.addEventListener("input", () => {
          renderHighlightedEditor(editor, language);
          scheduleRun();
          saveCode();
        });

        editor.addEventListener("paste", (e) => {
          e.preventDefault();
          const text = e.clipboardData?.getData("text/plain") || "";
          recordHistory(editor);
          insertAtCaret(text);
          renderHighlightedEditor(editor, language);
          scheduleRun();
          saveCode();
        });

        editor.addEventListener("keydown", (e) => {
          const mod = e.metaKey || e.ctrlKey;
          if (mod && e.key.toLowerCase() === "z") {
            e.preventDefault();
            if (e.shiftKey) redoEditor(editor, language);
            else undoEditor(editor, language);
            return;
          }
          if (mod && e.key.toLowerCase() === "y") {
            e.preventDefault();
            redoEditor(editor, language);
            return;
          }
          if (e.key !== "Tab") return;
          e.preventDefault();
          recordHistory(editor);
          insertAtCaret("  ");
          renderHighlightedEditor(editor, language);
          scheduleRun();
          saveCode();
        });
      }

      function refreshEditors() {
        renderHighlightedEditor(htmlEd, "xml");
        renderHighlightedEditor(cssEd, "css");
        renderHighlightedEditor(jsEd, "javascript");
      }

      /* ── State ─────────────────────────────────────────────────────── */
      let throttleTimer = null;
      let lastRunAt = 0;
      let logCount = 0;
      let consoleOpen = false;
      let appState = {
        code: { h: null, c: null, j: null },
        dimensions: {
          editorsW: "",
          htmlH: "",
          cssH: "",
          jsH: "",
          consoleH: "",
        },
        console: { open: false },
      };

      /* ── LocalStorage ──────────────────────────────────────────────── */
      function saveState() {
        localStorage.setItem("sandbox-state", JSON.stringify(appState));
      }

      function loadState() {
        const saved = localStorage.getItem("sandbox-state");
        if (saved) {
          try {
            const s = JSON.parse(saved);
            if (s.code) appState.code = { ...appState.code, ...s.code };
            if (s.dimensions)
              appState.dimensions = { ...appState.dimensions, ...s.dimensions };
            if (s.console)
              appState.console = { ...appState.console, ...s.console };
          } catch (e) {}
        }
      }

      const EDITOR_HANDLE_PX = 8;
      const MIN_EDITOR_PANEL_PX = 50;
      const DEFAULT_CONSOLE_HEIGHT_PX = 190;
      const MIN_CONSOLE_HEIGHT_PX = 60;

      function getEditorUsableHeight() {
        return Math.max(0, editorsPane.offsetHeight - EDITOR_HANDLE_PX);
      }

      function pxToPanelPercent(px) {
        const usable = getEditorUsableHeight();
        return usable > 0 ? (px / usable) * 100 : 0;
      }

      function panelPercentToScale(percent) {
        return Math.max(0, percent / 100);
      }

      function normalizeConsoleHeight(value) {
        const n = parseFloat(value);
        if (!Number.isFinite(n) || n < MIN_CONSOLE_HEIGHT_PX) {
          return DEFAULT_CONSOLE_HEIGHT_PX + "px";
        }
        return n + "px";
      }

      function getPanelPercent(panel) {
        const usable = getEditorUsableHeight();
        return usable > 0 ? (panel.offsetHeight / usable) * 100 : 0;
      }

      function setEditorHeights(htmlPct, cssPct, jsPct) {
        const htmlScale = panelPercentToScale(htmlPct);
        const cssScale = panelPercentToScale(cssPct);
        const jsScale = panelPercentToScale(jsPct);
        const containerH = editorsPane.offsetHeight;
        const usableRatio =
          containerH > 0 ? getEditorUsableHeight() / containerH : 0;
        htmlPanel.style.height =
          (htmlScale * usableRatio * 100).toFixed(6) + "%";
        cssPanel.style.height = (cssScale * usableRatio * 100).toFixed(6) + "%";
        jsPanel.style.height = (jsScale * usableRatio * 100).toFixed(6) + "%";
      }

      function normalizeEditorWidth(value) {
        if (!value) return "50%";
        if (value.endsWith("%")) return value;
        if (value.endsWith("px")) {
          return (
            ((parseFloat(value) / mainArea.offsetWidth) * 100).toFixed(3) + "%"
          );
        }
        return value;
      }

      function saveCode() {
        appState.code = {
          h: getEditorValue(htmlEd),
          c: getEditorValue(cssEd),
          j: getEditorValue(jsEd),
        };
        saveState();
      }

      function saveDimensions() {
        const widthPct =
          ((editorsPane.offsetWidth / mainArea.offsetWidth) * 100).toFixed(3) +
          "%";
        appState.dimensions = {
          editorsW: widthPct,
          htmlH: getPanelPercent(htmlPanel).toFixed(3) + "%",
          cssH: getPanelPercent(cssPanel).toFixed(3) + "%",
          jsH: getPanelPercent(jsPanel).toFixed(3) + "%",
          consoleH: normalizeConsoleHeight(
            consolePn.style.height || consolePn.offsetHeight + "px",
          ),
        };
        saveState();
      }

      function saveConsole() {
        appState.console = { open: consoleOpen };
        saveState();
      }

      /* ── Drag shield ───────────────────────────────────────────────── */
      function dragStart(cursorClass) {
        dragShield.classList.add("active");
        document.body.classList.add(cursorClass || "dragging");
      }
      function dragEnd(cursorClass) {
        dragShield.classList.remove("active");
        document.body.classList.remove(cursorClass || "dragging");
        refreshEditors();
      }

      /* ── Toast ─────────────────────────────────────────────────────── */
      let toastTimer;
      function toast(msg, type) {
        clearTimeout(toastTimer);
        toastMsg.textContent = msg;
        toastEl.className = "show " + (type || "ok");
        toastTimer = setTimeout(function () {
          toastEl.className = "";
        }, 2600);
      }

      /* ── URL state ─────────────────────────────────────────────────── */
      function encodeState() {
        return btoa(
          unescape(
            encodeURIComponent(
              JSON.stringify({
                h: getEditorValue(htmlEd),
                c: getEditorValue(cssEd),
                j: getEditorValue(jsEd),
              }),
            ),
          ),
        );
      }

      function decodeState(b64) {
        try {
          const s = JSON.parse(decodeURIComponent(escape(atob(b64))));
          if (s.h !== undefined) setEditorValue(htmlEd, s.h);
          if (s.c !== undefined) setEditorValue(cssEd, s.c);
          if (s.j !== undefined) setEditorValue(jsEd, s.j);
          return true;
        } catch {
          return false;
        }
      }

      function loadFromURL() {
        const hash = location.hash.slice(1);
        if (hash && decodeState(hash)) {
          history.replaceState(null, "", location.pathname + location.search);
          return true;
        }
        return false;
      }

      /* ── Run preview ───────────────────────────────────────────────── */
      function run() {
        const consoleInjection = `<script>(function(){
var _p=function(l,a){
  var s=Array.from(a).map(function(x){
    try{return typeof x==='object'&&x!==null?JSON.stringify(x,null,2):String(x);}
    catch(e){return '[Object]';}
  }).join(' ');
  window.parent.postMessage({__pg_console:1,level:l,msg:s},'*');
};
['log','warn','error','info'].forEach(function(m){
  var o=console[m];
  console[m]=function(){_p(m,arguments);o.apply(console,arguments);};
});
window.addEventListener('error',function(e){
  window.parent.postMessage({__pg_console:1,level:'error',msg:e.message+(e.lineno?' (line '+e.lineno+')':'')},'*');
});
window.addEventListener('unhandledrejection',function(e){
  window.parent.postMessage({__pg_console:1,level:'error',msg:'Unhandled rejection: '+(e.reason&&e.reason.message||e.reason)},'*');
});
})();<\/script>`;

        const src =
          '<!DOCTYPE html><html><head><meta charset="UTF-8">\n' +
          "<style>" +
          getEditorValue(cssEd) +
          "</style></head><body>\n" +
          getEditorValue(htmlEd) +
          "\n" +
          consoleInjection +
          "\n" +
          "<script>try{" +
          getEditorValue(jsEd) +
          "}catch(e){console.error(e.message);}<\/script>\n" +
          "</body></html>";

        frame.srcdoc = src;
      }

      function scheduleRun() {
        const now = Date.now();
        const elapsed = now - lastRunAt;
        const wait = 100;

        if (elapsed >= wait) {
          lastRunAt = now;
          run();
          return;
        }

        clearTimeout(throttleTimer);
        throttleTimer = setTimeout(() => {
          lastRunAt = Date.now();
          run();
          throttleTimer = null;
        }, wait - elapsed);
      }

      /* ── Console messages from iframe ──────────────────────────────── */
      window.addEventListener("message", function (e) {
        if (!e.data || !e.data.__pg_console) return;
        appendConsole(e.data.level, e.data.msg);
      });

      function appendConsole(level, msg) {
        logCount++;
        consoleCount.textContent = logCount;
        consoleCount.classList.add("visible");

        const row = document.createElement("div");
        row.className = "c-entry " + (level || "log");

        const gut = document.createElement("span");
        gut.className = "c-gutter";

        const txt = document.createElement("span");
        txt.className = "c-msg";
        txt.textContent = msg;

        row.appendChild(gut);
        row.appendChild(txt);
        consoleOut.appendChild(row);
        consoleOut.scrollTop = consoleOut.scrollHeight;
      }

      function clearConsole() {
        consoleOut.innerHTML = "";
        logCount = 0;
        consoleCount.textContent = "0";
        consoleCount.classList.remove("visible");
      }

      /* ── Button handlers ───────────────────────────────────────────── */
      document
        .getElementById("btn-refresh")
        .addEventListener("click", function () {
          clearConsole();
          run();
        });

      document
        .getElementById("btn-share")
        .addEventListener("click", function () {
          const encoded = encodeState();
          const url = location.origin + location.pathname + "#" + encoded;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(function () {
              toast("URL copied to clipboard", "copy");
            });
          } else {
            const tmp = document.createElement("textarea");
            tmp.value = url;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand("copy");
            document.body.removeChild(tmp);
            toast("URL copied to clipboard", "copy");
          }
        });

      btnConsole.addEventListener("click", toggleConsole);
      document
        .getElementById("btn-clear")
        .addEventListener("click", clearConsole);

      function toggleConsole() {
        consoleOpen = !consoleOpen;
        consolePn.classList.toggle("visible", consoleOpen);
        consoleRes.classList.toggle("visible", consoleOpen);
        btnConsole.classList.toggle("active", consoleOpen);
        saveConsole();
      }

      /* ── Resize: vertical split (editors ↔ preview) ────────────────── */
      {
        const handle = document.getElementById("rv");
        let dragging = false,
          startX = 0,
          startW = 0;

        handle.addEventListener("mousedown", function (e) {
          dragging = true;
          startX = e.clientX;
          startW = editorsPane.offsetWidth;
          dragStart("dragging");
          handle.classList.add("dragging");
          e.preventDefault();
        });

        document.addEventListener("mousemove", function (e) {
          if (!dragging) return;
          const mainW = mainArea.offsetWidth;
          const newW = Math.max(
            160,
            Math.min(startW + e.clientX - startX, mainW - 164),
          );
          editorsPane.style.width = ((newW / mainW) * 100).toFixed(3) + "%";
        });

        document.addEventListener("mouseup", function () {
          if (!dragging) return;
          dragging = false;
          dragEnd("dragging");
          handle.classList.remove("dragging");
          saveDimensions();
        });
      }

      /* ── Resize: horizontal split 1 (html ↔ css+js) ───────────────── */
      {
        const handle = document.getElementById("rh1");
        let dragging = false,
          startY = 0,
          startH = 0,
          startCssH = 0,
          startJsH = 0;

        handle.addEventListener("mousedown", function (e) {
          dragging = true;
          startY = e.clientY;
          startH = htmlPanel.offsetHeight;
          startCssH = cssPanel.offsetHeight;
          startJsH = jsPanel.offsetHeight;
          dragStart("dragging-h");
          handle.classList.add("dragging");
          e.preventDefault();
        });

        document.addEventListener("mousemove", function (e) {
          if (!dragging) return;
          const delta = e.clientY - startY;
          const usableH = getEditorUsableHeight();
          const startSecondSplit = startH + startCssH;
          const minHtmlH = MIN_EDITOR_PANEL_PX;
          const maxHtmlH = usableH - MIN_EDITOR_PANEL_PX * 2;
          const newHtmlH = Math.max(
            minHtmlH,
            Math.min(startH + delta, maxHtmlH),
          );

          let cssH = startSecondSplit - newHtmlH;
          let jsH = startJsH;

          // If CSS hits minimum, keep CSS visible and push second splitter down.
          if (cssH < MIN_EDITOR_PANEL_PX) {
            cssH = MIN_EDITOR_PANEL_PX;
            jsH = Math.max(MIN_EDITOR_PANEL_PX, usableH - newHtmlH - cssH);
          }

          const htmlPct = pxToPanelPercent(newHtmlH);
          const cssPct = pxToPanelPercent(cssH);
          const jsPct = pxToPanelPercent(jsH);
          setEditorHeights(htmlPct, cssPct, jsPct);
        });

        document.addEventListener("mouseup", function () {
          if (!dragging) return;
          dragging = false;
          dragEnd("dragging-h");
          handle.classList.remove("dragging");
          saveDimensions();
        });
      }

      /* ── Resize: horizontal split 2 (css ↔ js) ────────────────────── */
      {
        const handle = document.getElementById("rh2");
        let dragging = false,
          startY = 0,
          startH = 0,
          startHtmlH = 0;

        handle.addEventListener("mousedown", function (e) {
          dragging = true;
          startY = e.clientY;
          startH = cssPanel.offsetHeight;
          startHtmlH = htmlPanel.offsetHeight;
          dragStart("dragging-h");
          handle.classList.add("dragging");
          e.preventDefault();
        });

        document.addEventListener("mousemove", function (e) {
          if (!dragging) return;
          const delta = e.clientY - startY;
          const usableH = getEditorUsableHeight();
          const startSplitH = startHtmlH + startH;
          const minSplitH = MIN_EDITOR_PANEL_PX * 2;
          const maxSplitH = usableH - MIN_EDITOR_PANEL_PX;
          const splitH = Math.max(
            minSplitH,
            Math.min(startSplitH + delta, maxSplitH),
          );

          let htmlH = startHtmlH;
          let cssH = splitH - htmlH;

          // If CSS would collapse, keep CSS at minimum and push HTML up.
          if (cssH < MIN_EDITOR_PANEL_PX) {
            htmlH = Math.max(MIN_EDITOR_PANEL_PX, splitH - MIN_EDITOR_PANEL_PX);
            cssH = splitH - htmlH;
          }

          const jsH = Math.max(MIN_EDITOR_PANEL_PX, usableH - splitH);
          const htmlPct = pxToPanelPercent(htmlH);
          const cssPct = pxToPanelPercent(cssH);
          const jsPct = pxToPanelPercent(jsH);
          setEditorHeights(htmlPct, cssPct, jsPct);
        });

        document.addEventListener("mouseup", function () {
          if (!dragging) return;
          dragging = false;
          dragEnd("dragging-h");
          handle.classList.remove("dragging");
          saveDimensions();
        });
      }

      /* ── Resize: console height ────────────────────────────────────── */
      {
        const handle = document.getElementById("console-resize");
        let dragging = false,
          startY = 0,
          startH = 0;

        handle.addEventListener("mousedown", function (e) {
          dragging = true;
          startY = e.clientY;
          startH = consolePn.offsetHeight;
          dragStart("dragging-h");
          handle.classList.add("dragging");
          e.preventDefault();
        });

        document.addEventListener("mousemove", function (e) {
          if (!dragging) return;
          const previewH = document.getElementById("preview-pane").offsetHeight;
          const newH = Math.max(
            60,
            Math.min(startH - (e.clientY - startY), previewH - 80),
          );
          consolePn.style.height = newH + "px";
        });

        document.addEventListener("mouseup", function () {
          if (!dragging) return;
          dragging = false;
          dragEnd("dragging-h");
          handle.classList.remove("dragging");
          saveDimensions();
        });
      }

      /* ── Default content ───────────────────────────────────────────── */
      const DEFAULT_HTML = `<div class="card">
  <h1>Hey there! 👋</h1>
  <p>Edit HTML, CSS, and JavaScript in the panels on the left. Changes run automatically.</p>
  <div class="actions">
    <button onclick="sayHello()">Say Hello</button>
    <button class="outline" onclick="changeTheme()">Change Color</button>
  </div>
</div>`;

      const DEFAULT_CSS = `* { box-sizing: border-box; margin: 0; padding: 0; }

      const DEFAULT_JS = `const colors = ['#388bfd', '#3fb950', '#e8912d', '#c98fff', '#f85149', '#e6b450'];
let ci = 0;

function sayHello() {
  const greetings = ['Hello! 👋', 'Hey there! ✨', 'Hi! 🚀', 'Howdy! 🤠'];
  const msg = greetings[Math.floor(Math.random() * greetings.length)];
  console.log('Button clicked:', msg);
  alert(msg);
}

function changeTheme() {
  ci = (ci + 1) % colors.length;
  document.querySelector('button:not(.outline)').style.background = colors[ci];
  document.querySelector('.icon').style.backgroundImage =
    \`linear-gradient(135deg, \${colors[ci]}, \${colors[(ci+2)%colors.length]})\`;
  console.log('Theme color changed to', colors[ci]);
}

console.log('Sandbox ready ✓');`;

      /* ── Init ──────────────────────────────────────────────────────── */
      loadState();
      const loaded = loadFromURL();
      if (!loaded) {
        // Load code from stored state only when there is no URL state
        setEditorValue(
          htmlEd,
          appState.code.h != null ? appState.code.h : DEFAULT_HTML,
        );
        setEditorValue(
          cssEd,
          appState.code.c != null ? appState.code.c : DEFAULT_CSS,
        );
        setEditorValue(
          jsEd,
          appState.code.j != null ? appState.code.j : DEFAULT_JS,
        );
      }

      editorsPane.style.width = normalizeEditorWidth(
        appState.dimensions.editorsW,
      );

      if (
        appState.dimensions.htmlH &&
        appState.dimensions.cssH &&
        appState.dimensions.jsH
      ) {
        setEditorHeights(
          parseFloat(appState.dimensions.htmlH),
          parseFloat(appState.dimensions.cssH),
          parseFloat(appState.dimensions.jsH),
        );
      } else {
        setEditorHeights(33.3333, 33.3333, 33.3334);
      }

      if (appState.dimensions.consoleH)
        consolePn.style.height = normalizeConsoleHeight(
          appState.dimensions.consoleH,
        );
      else consolePn.style.height = DEFAULT_CONSOLE_HEIGHT_PX + "px";

      if (appState.console.open) {
        consoleOpen = true;
        consolePn.classList.add("visible");
        consoleRes.classList.add("visible");
        btnConsole.classList.add("active");
      }

      // Attach change listeners after initial content is set (avoids spurious run)
      bindEditorBehavior(htmlEd, "xml");
      bindEditorBehavior(cssEd, "css");
      bindEditorBehavior(jsEd, "javascript");

      refreshEditors();
      run();
    </script>
